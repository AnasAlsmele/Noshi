<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noshi — Docs</title>
    <meta name="description" content="Noshi v2.0 — One JS file. All components. No CSS needed.">
    <link rel="shortcut icon" href="./imgs/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="./noshi/noshi.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --c-bg: #ffffff;
            --c-sidebar: #f9fafb;
            --c-border: #e5e7eb;
            --c-text: #111827;
            --c-muted: #6b7280;
            --c-primary: #0077b6;
            --c-primary-soft: rgba(0,119,182,.08);
            --c-header: rgba(255,255,255,0.9);
            --header-h: 62px;
            --sidebar-w: 258px;
            --toc-w: 210px;
        }
        .dark {
            --c-bg: #0f1117;
            --c-sidebar: #161920;
            --c-border: #1f2937;
            --c-text: #f3f4f6;
            --c-muted: #9ca3af;
            --c-header: rgba(15,17,23,0.92);
            --c-primary-soft: rgba(0,119,182,.15);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--c-bg); color: var(--c-text); display: flex; flex-direction: column; min-height: 100vh; }

        /* ── Header ── */
        .d-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--c-header); border-bottom: 1px solid var(--c-border); backdrop-filter: blur(12px); display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem; z-index: 200; }
        .d-logo { display: flex; align-items: center; gap: .6rem; text-decoration: none; flex-shrink: 0; }
        .d-logo img { height: 30px; width: auto; }
        .d-logo-name { font-size: 1.1rem; font-weight: 700; color: var(--c-primary); }
        .d-logo-ver  { font-size: .72rem; background: var(--c-primary-soft); color: var(--c-primary); padding: .15rem .5rem; border-radius: 20px; font-weight: 600; }
        .d-header-spacer { flex: 1; }
        .d-header-links { display: flex; gap: .25rem; }
        .d-header-link { padding: .35rem .75rem; border-radius: 6px; color: var(--c-muted); font-size: .88rem; text-decoration: none; transition: all .2s; }
        .d-header-link:hover { background: var(--c-primary-soft); color: var(--c-primary); }
        .d-dark-btn { cursor: pointer; background: none; border: 1px solid var(--c-border); border-radius: 8px; padding: .35rem .6rem; font-size: 1rem; color: var(--c-muted); transition: all .2s; }
        .d-dark-btn:hover { border-color: var(--c-primary); color: var(--c-primary); }

        /* ── Layout ── */
        .d-layout { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }

        /* ── Sidebar ── */
        .d-sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--c-sidebar); border-right: 1px solid var(--c-border); position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; padding: 0 0 3rem; }
        .d-sidebar::-webkit-scrollbar { width: 4px; }
        .d-sidebar::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 4px; }
        /* Search */
        .d-search-wrap { padding: 1rem 1rem .5rem; position: sticky; top: 0; background: var(--c-sidebar); z-index: 10; border-bottom: 1px solid var(--c-border); }
        .d-search { width: 100%; padding: .45rem .8rem; border: 1.5px solid var(--c-border); border-radius: 8px; font-size: .85rem; background: var(--c-bg); color: var(--c-text); outline: none; font-family: inherit; transition: all .2s; }
        .d-search:focus { border-color: var(--c-primary); box-shadow: 0 0 0 3px var(--c-primary-soft); }
        .d-search::placeholder { color: var(--c-muted); }
        .d-search-hint { font-size: .7rem; color: var(--c-muted); text-align: right; margin-top: .3rem; }
        .d-section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--c-muted); padding: 1.25rem 1.25rem .4rem; }
        .d-nav-link { display: flex; align-items: center; gap: .5rem; padding: .45rem 1.25rem; font-size: .88rem; color: var(--c-muted); cursor: pointer; transition: all .18s; border-left: 2px solid transparent; text-decoration: none; }
        .d-nav-link:hover { color: var(--c-primary); background: var(--c-primary-soft); }
        .d-nav-link.active { color: var(--c-primary); background: var(--c-primary-soft); border-left-color: var(--c-primary); font-weight: 600; }
        .d-nav-link.hidden { display: none; }
        /* Mobile toggle */
        .d-menu-btn { display: none; cursor: pointer; background: none; border: 1px solid var(--c-border); border-radius: 8px; padding: .35rem .55rem; color: var(--c-muted); font-size: 1.1rem; }
        .d-sidebar.open { display: block !important; position: fixed; top: var(--header-h); left: 0; z-index: 150; height: calc(100vh - var(--header-h)); }

        /* ── Main Content ── */
        .d-content { flex: 1; min-width: 0; padding: 3rem 3.5rem; max-width: 860px; }
        #page-area { transition: opacity .25s ease; animation: fadeIn .35s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* Content typography */
        #page-area h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 2px solid var(--c-border); }
        #page-area h2 { font-size: 1.3rem; font-weight: 600; margin: 2.5rem 0 .75rem; padding-bottom: .4rem; border-bottom: 1px solid var(--c-border); }
        #page-area h3 { font-size: 1.05rem; font-weight: 600; margin: 1.75rem 0 .5rem; color: var(--c-primary); }
        #page-area p  { line-height: 1.8; margin-bottom: 1rem; color: var(--c-muted); }
        #page-area ul { padding-left: 1.5rem; margin-bottom: 1rem; }
        #page-area li { margin-bottom: .4rem; line-height: 1.7; color: var(--c-muted); }
        #page-area strong, #page-area b { color: var(--c-text); font-weight: 600; }
        #page-area a  { color: var(--c-primary); text-decoration: underline; }
        #page-area code { font-family: 'Fira Code', monospace; font-size: .83em; background: var(--c-primary-soft); color: var(--c-primary); padding: .15rem .45rem; border-radius: 4px; }
        /* Code blocks */
        .code-wrap { position: relative; margin: 1rem 0; }
        #page-area pre.docs-code { background: #0d1117; color: #e6edf3; font-family: 'Fira Code', monospace; font-size: .84rem; line-height: 1.75; padding: 1.25rem 1.5rem; border-radius: 10px; overflow-x: auto; white-space: pre; margin: 0; border: 1px solid #21262d; }
        /* Syntax highlight colors */
        .hl-kw  { color: #ff7b72; }  /* keywords: const, let, if */
        .hl-str { color: #a5d6ff; }  /* strings */
        .hl-cmt { color: #8b949e; font-style: italic; } /* comments */
        .hl-num { color: #79c0ff; }  /* numbers */
        .hl-fn  { color: #d2a8ff; }  /* function calls */
        .hl-key { color: #ffa657; }  /* object keys */
        /* Copy button */
        .copy-btn { position: absolute; top: .6rem; right: .6rem; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: #8b949e; font-size: .73rem; font-weight: 600; padding: .25rem .7rem; border-radius: 5px; cursor: pointer; transition: all .2s; font-family: 'Inter',sans-serif; letter-spacing: .02em; z-index: 2; }
        .copy-btn:hover { background: rgba(255,255,255,.14); color: #e6edf3; }
        .copy-btn.copied { color: #3fb950; border-color: #3fb950; }
        /* Preview box */
        .preview-box { border: 1px solid var(--c-border); border-radius: 10px; padding: 1.5rem; margin-bottom: 0; background: var(--c-bg); display: flex; flex-wrap: wrap; gap: .75rem; align-items: flex-start; position: relative; overflow: auto; }
        .preview-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--c-muted); margin-bottom: .75rem; width: 100%; }
        .preview-box + .code-wrap { margin-top: 0; }
        .preview-box + .code-wrap pre { border-top-left-radius: 0; border-top-right-radius: 0; border-top: none; }
        .preview-box { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        /* Heading anchor */
        .anchor-link { opacity: 0; margin-left: .4rem; color: var(--c-muted); font-size: .85em; text-decoration: none; transition: opacity .2s; }
        #page-area h2:hover .anchor-link, #page-area h3:hover .anchor-link { opacity: 1; }
        /* Tables */
        #page-area table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; font-size: .88rem; }
        #page-area thead th { background: var(--c-sidebar); padding: .6rem 1rem; text-align: left; font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; color: var(--c-muted); border-bottom: 2px solid var(--c-border); }
        #page-area tbody td { padding: .65rem 1rem; border-bottom: 1px solid var(--c-border); color: var(--c-muted); }
        #page-area tbody tr:hover td { background: var(--c-sidebar); }
        #page-area tbody tr:last-child td { border-bottom: none; }
        /* Prev/Next nav */
        .page-nav { display: flex; justify-content: space-between; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--c-border); gap: 1rem; }
        .page-nav-btn { display: flex; flex-direction: column; padding: .85rem 1.25rem; border: 1px solid var(--c-border); border-radius: 10px; text-decoration: none; color: var(--c-text); transition: all .2s; max-width: 48%; }
        .page-nav-btn:hover { border-color: var(--c-primary); background: var(--c-primary-soft); }
        .page-nav-btn small { font-size: .72rem; color: var(--c-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
        .page-nav-btn span { font-size: .95rem; font-weight: 600; margin-top: .2rem; color: var(--c-primary); }
        .page-nav-btn.prev small::before { content: '← '; }
        .page-nav-btn.next { align-items: flex-end; margin-left: auto; }
        .page-nav-btn.next small::after { content: ' →'; }

        /* ── TOC ── */
        .d-toc { width: var(--toc-w); flex-shrink: 0; padding: 3rem 1.25rem; position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; }
        .d-toc-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--c-muted); margin-bottom: .75rem; }
        .d-toc-link { display: block; font-size: .8rem; color: var(--c-muted); padding: .3rem 0 .3rem .75rem; border-left: 2px solid var(--c-border); text-decoration: none; transition: all .18s; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .d-toc-link:hover, .d-toc-link.active { color: var(--c-primary); border-left-color: var(--c-primary); }
        .d-toc-link.h3 { margin-left: .75rem; font-size: .76rem; }

        /* ── Editable Playground ── */
        .code-editor {
            display: block; width: 100%; background: #0d1117; color: #e6edf3;
            font-family: 'Fira Code', monospace; font-size: .84rem; line-height: 1.75;
            padding: 1.25rem 1.5rem; border: 1px solid #21262d; border-bottom: none;
            border-radius: 10px 10px 0 0; resize: none; outline: none;
            tab-size: 4; white-space: pre; overflow-x: auto; box-sizing: border-box;
        }
        .code-editor::selection { background: rgba(0,119,182,.4); }
        .code-toolbar {
            display: flex; align-items: center; gap: .5rem;
            background: #161b22; border: 1px solid #21262d;
            border-top: 1px solid #30363d; border-radius: 0 0 10px 10px;
            padding: .45rem .75rem;
        }
        .code-hint { font-size: .72rem; color: #484f58; flex: 1; font-family: 'Fira Code', monospace; }
        .copy-btn-bar { position: static; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); color: #8b949e; font-size: .72rem; font-weight: 600; padding: .2rem .6rem; border-radius: 4px; cursor: pointer; transition: all .2s; font-family: inherit; }
        .copy-btn-bar:hover { background: rgba(255,255,255,.12); color: #e6edf3; }
        .copy-btn-bar.copied { color: #3fb950; border-color: #3fb950; }
        .run-btn {
            padding: .25rem .85rem; background: var(--c-primary); color: #fff;
            border: none; border-radius: 5px; font-size: .78rem; font-weight: 600;
            cursor: pointer; transition: all .2s; font-family: inherit; letter-spacing: .02em;
        }
        .run-btn:hover { filter: brightness(1.12); }
        .reset-btn {
            padding: .25rem .65rem; background: rgba(255,255,255,.05); color: #8b949e;
            border: 1px solid rgba(255,255,255,.1); border-radius: 5px; font-size: .78rem;
            cursor: pointer; transition: all .2s; font-family: inherit;
        }
        .reset-btn:hover { background: rgba(255,255,255,.1); color: #e6edf3; }
        /* When playground is above preview, join the borders */
        .preview-box + .code-wrap .code-editor { border-radius: 0; border-top: 1px solid #30363d; }
        .preview-box + .code-wrap .code-toolbar { border-radius: 0 0 10px 10px; }
        .preview-box { border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; border-bottom: none; }

        /* ── Responsive ── */
        @media (max-width: 1100px) { .d-toc { display: none; } }
        @media (max-width: 768px) { .d-sidebar { display: none; } .d-content { padding: 1.5rem 1.25rem; } .d-menu-btn { display: block; } }
    </style>
</head>
<body>
    <!-- header -->
    <header class="d-header" id="d-header">
        <a href="index.html" class="d-logo">
            <img src="./imgs/Noshi.png" alt="Noshi">
            <span class="d-logo-name">Noshi</span>
            <span class="d-logo-ver">v2.0</span>
        </a>
        <div class="d-header-spacer"></div>
        <nav class="d-header-links">
            <a href="index.html"                                  class="d-header-link">Docs</a>
            <a href="../examples/example1.html"                   class="d-header-link">Examples</a>
            <a href="https://github.com/AnasMusic/Noshi" target="_blank" class="d-header-link">GitHub</a>
        </nav>
        <button class="d-menu-btn" id="menu-toggle" title="Toggle menu">☰</button>
        <button class="d-dark-btn" id="dark-toggle" title="Toggle dark mode">🌙</button>
    </header>

    <!-- layout -->
    <div class="d-layout">
        <aside class="d-sidebar" id="d-sidebar"></aside>
        <main class="d-content">
            <div id="page-area">
                <p style="color:var(--c-muted)">Loading…</p>
            </div>
        </main>
        <aside class="d-toc" id="d-toc"></aside>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noshi Analytics Pro — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="../noshi.js"></script>
<style>
  :root {
    --p: #6366f1; /* Indigo */
    --bg: #0f172a;
    --card: #1e293b;
    --border: rgba(255,255,255,0.06);
    --txt: #f1f5f9;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; }
  
  /* Layout */
  .dash-container { display: flex; height: 100vh; width: 100vw; }
  .dash-sidebar { width: 260px; background: #0b1120; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: all 0.3s ease; }
  .dash-sidebar.collapsed { width: 80px; }
  .dash-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .dash-content { flex: 1; overflow-y: auto; padding: 2rem; }

  /* Sidebar */
  .sb-brand { padding: 1.5rem 2rem; font-size: 1.2rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 0.75rem; }
  .sb-brand span { background: var(--p); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .sb-nav { padding: 1rem; flex: 1; }
  .sb-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; border-radius: 10px; color: var(--muted); text-decoration: none; transition: all 0.2s; margin-bottom: 0.25rem; cursor: pointer; }
  .sb-item:hover, .sb-item.active { background: rgba(99, 102, 241, 0.1); color: #fff; }
  .sb-item.active { color: var(--p); font-weight: 600; }
  .sb-item i { font-size: 1.1rem; width: 20px; text-align: center; }

  /* Topbar */
  .dash-topbar { height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; flex-shrink: 0; }
  .tb-search { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; width: 300px; }
  .tb-search input { background: transparent; border: none; color: #fff; outline: none; font-size: 0.88rem; width: 100%; }
  .tb-actions { display: flex; align-items: center; gap: 1.25rem; }
  .tb-icon { color: var(--muted); cursor: pointer; position: relative; }
  .tb-icon:hover { color: #fff; }
  .tb-icon .badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 10px; font-weight: 700; }
  .tb-user { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
  .tb-user img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--p); }

  /* Dashboard Widgets */
  .grid-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
  .dash-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
  .dash-card-title { font-size: 0.95rem; font-weight: 600; color: var(--txt); margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  
  /* FAB */
  .code-fab { position: fixed; bottom: 2rem; right: 2rem; z-index: 900; width: 52px; height: 52px; border-radius: 50%; background: var(--p); color: #fff; font-family: 'Fira Code',monospace; font-size: .95rem; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 6px 24px rgba(99,102,241,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
  .code-fab:hover { transform: scale(1.1); }
  
  /* Code Viewer */
  .code-viewer { position: fixed; inset: 0; z-index: 9999; background: #0d1117; display: flex; flex-direction: column; }
  .cv-header { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.5rem; background: #161b22; border-bottom: 1px solid #21262d; }
  .cv-title { font-family: 'Fira Code',monospace; font-size: .85rem; color: #8b949e; }
  .cv-title span { color: #c9d1d9; }
  .cv-actions { display: flex; gap: .5rem; }
  .cv-btn { padding: .3rem .85rem; border-radius: 6px; font-size: .78rem; font-weight: 600; cursor: pointer; border: none; }
  .cv-copy { background: rgba(255,255,255,0.07); color: #8b949e; border: 1px solid rgba(255,255,255,0.1); }
  .cv-close { background: var(--p); color: #fff; }
  .cv-body { flex: 1; overflow: auto; padding: 1.5rem 2rem; }
  .cv-body pre { font-family:'Fira Code',monospace; font-size:.82rem; line-height:1.8; color:#e6edf3; white-space:pre; }
  .tk{color:#ff7b72}.ts{color:#a5d6ff}.tm{color:#d2a8ff}.tc{color:#8b949e;font-style:italic}.tn{color:#79c0ff}.tk2{color:#ffa657}

  /* Custom Table styling for dash */
  .noshi-table-wrap { background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
  .noshi-table thead th { background: rgba(255,255,255,0.03) !important; color: var(--muted) !important; font-size: 0.75rem !important; text-transform: uppercase !important; letter-spacing: 0.05em !important; border-bottom: 1px solid var(--border) !important; }
  .noshi-table tbody td { border-bottom: 1px solid var(--border) !important; color: #cbd5e1 !important; font-size: 0.85rem !important; padding: 1rem !important; }
  .noshi-table tbody tr:hover td { background: rgba(255,255,255,0.02) !important; }

  /* Noshi Component Overrides for Dark Theme */
  .noshi-stats-card { background: var(--card) !important; border: 1px solid var(--border) !important; }
  .noshi-stats-value { color: var(--txt) !important; }
  .noshi-stats-label { color: var(--muted) !important; }
  .noshi-stats-icon { background: rgba(99,102,241,0.1) !important; }

  .noshi-modal { background: var(--card) !important; border: 1px solid var(--border) !important; color: var(--txt) !important; }
  .noshi-modal-header { border-bottom: 1px solid var(--border) !important; }
  .noshi-modal-footer { background: rgba(255,255,255,0.02) !important; border-top: 1px solid var(--border) !important; }
  .noshi-input, .noshi-select { background: rgba(255,255,255,0.03) !important; border: 1px solid var(--border) !important; color: var(--txt) !important; }
  .noshi-field-label { color: var(--txt) !important; }
</style>
</head>
<body>

<div id="dash-root"></div>

<button class="code-fab" id="code-fab">&lt;/&gt;</button>

<script id="page-source">
Noshi.start(() => {
    const b = new NoshiBuilder();
    const { $, $$, create, on, append, store } = Noshi;

    // 1. Initial State
    store.set('notifications', 4);
    store.set('user', { name: 'Sarah Connor', role: 'Administrator', avatar: 'https://i.pravatar.cc/100?img=47' });

    /* ── SIDEBAR COMPONENT ── */
    const sidebar = create('div', { class: 'dash-sidebar', child: [
        create('div', { class: 'sb-brand', child: [
            create('span', { text: 'N' }),
            create('div', { text: 'Noshi Pro' })
        ]}),
        create('div', { class: 'sb-nav', child: [
            { icon: 'home', label: 'Overview', active: true },
            { icon: 'chart', label: 'Analytics' },
            { icon: 'users', label: 'Customers' },
            { icon: 'folder', label: 'Projects' },
            { icon: 'settings', label: 'Settings' }
        ].map(item => {
            const el = create('div', { class: 'sb-item' + (item.active ? ' active' : ''), child: [
                NoshiIcon(item.icon, { size: 18 }),
                create('span', { text: item.label })
            ]});
            on(el, 'click', function() {
                $$('.sb-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
            return el;
        })})
    ]});

    /* ── TOPBAR COMPONENT ── */
    const topbar = create('div', { class: 'dash-topbar', child: [
        create('div', { class: 'tb-search', child: [
            NoshiIcon('search', { size: 16, color: '#94a3b8' }),
            create('input', { placeholder: 'Search analytics...' })
        ]}),
        create('div', { class: 'tb-actions', child: [
            create('div', { class: 'tb-icon', child: [
                NoshiIcon('bell', { size: 20 }),
                create('span', { class: 'badge', text: store.get('notifications') })
            ]}),
            create('div', { class: 'tb-user', child: [
                create('div', { style: 'text-align: right', child: [
                    create('div', { style: 'font-size: 0.85rem; font-weight: 600', text: store.get('user').name }),
                    create('div', { style: 'font-size: 0.75rem; color: var(--muted)', text: store.get('user').role })
                ]}),
                create('img', { src: store.get('user').avatar })
            ]})
        ]})
    ]});

    /* ── MAIN CONTENT ASSEMBLY ── */
    const content = create('div', { class: 'dash-content', child: [
        // Row 1: Stats
        create('div', { class: 'grid-row', child: [
            b.statsCard({ label: 'Total Revenue', value: '$84,250', trend: '12.5%', trendUp: true, icon: NoshiIcon('chart', { color: 'var(--p)' }) }),
            b.statsCard({ label: 'Active Users', value: '12,840', trend: '3.2%', trendUp: true, icon: NoshiIcon('users', { color: 'var(--p)' }) }),
            b.statsCard({ label: 'Sales Count', value: '1,429', trend: '0.8%', trendUp: false, icon: NoshiIcon('grid', { color: 'var(--p)' }) }),
            b.statsCard({ label: 'Bounce Rate', value: '24.3%', trend: '4.1%', trendUp: true, icon: NoshiIcon('refresh', { color: 'var(--p)' }) })
        ]}),

        // Row 2: Graph & Actions
        create('div', { style: 'display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem', child: [
            create('div', { class: 'dash-card', child: [
                create('div', { class: 'dash-card-title', text: 'Revenue Forecast (6 Months)' }),
                b.graph({
                    type: 'line',
                    data: [4500, 5200, 4800, 6100, 5900, 7200],
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    height: 250,
                    color: '#6366f1'
                })
            ]}),
            create('div', { class: 'dash-card', child: [
                create('div', { class: 'dash-card-title', text: 'Quick Actions' }),
                create('div', { style: 'display: flex; flex-direction: column; gap: 0.75rem', child: [
                    b.button({ text: 'Add New User', class: 'active', icon: NoshiIcon('plus'), click: () => {
                        b.modal({
                            title: 'Create New User',
                            content: b.form({
                                fields: [
                                    { label: 'Full Name', name: 'name', placeholder: 'Enter name...' },
                                    { label: 'Role', name: 'role', type: 'list', list: ['Admin', 'Editor', 'Viewer'] }
                                ],
                                buttons: [{ text: 'Create Account', active: true, function: () => b.toast({ message: 'User created successfully!', type: 'success' }) }]
                            })
                        }).show();
                    }}),
                    b.button({ text: 'Export Report', class: 'outline', icon: NoshiIcon('download'), click: () => b.toast({ message: 'Exporting PDF...' }) }),
                    b.button({ text: 'System Check', class: 'outline', icon: NoshiIcon('refresh'), click: () => {
                        Noshi.loading.show('Scanning systems...');
                        setTimeout(() => Noshi.loading.hide(), 2000);
                    }})
                ]})
            ]})
        ]}),

        // Row 3: Table
        create('div', { class: 'dash-card', child: [
            create('div', { class: 'dash-card-title', child: [
                create('span', { text: 'Recent Transactions' }),
                b.button({ text: 'View All', class: 'outline', style: 'padding: 0.3rem 0.6rem; font-size: 0.75rem' })
            ]}),
            b.table({
                headers: ['ID', 'Customer', 'Status', 'Date', 'Amount'],
                data: [
                    ['#TR-8821', 'John Wick', create('span', { class: 'badge badge-success', text: 'Completed' }), 'May 12, 2024', '$1,200.00'],
                    ['#TR-8822', 'Bruce Wayne', create('span', { class: 'badge badge-warning', text: 'Pending' }), 'May 12, 2024', '$4,500.00'],
                    ['#TR-8823', 'Clark Kent', create('span', { class: 'badge badge-success', text: 'Completed' }), 'May 11, 2024', '$850.00'],
                    ['#TR-8824', 'Diana Prince', create('span', { class: 'badge badge-error', text: 'Failed' }), 'May 10, 2024', '$2,100.00'],
                    ['#TR-8825', 'Peter Parker', create('span', { class: 'badge badge-success', text: 'Completed' }), 'May 09, 2024', '$150.00']
                ],
                sortable: true
            })
        ]})
    ]});

    /* ── DASHBOARD ASSEMBLY ── */
    const main = create('div', { class: 'dash-main', child: [topbar, content] });
    const layout = create('div', { class: 'dash-container', child: [sidebar, main] });

    append('#dash-root', layout);

    /* ── CODE VIEWER ── */
    function hl(raw) {
        let c = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        c = c.replace(/(\/\/[^\n]*)/g,'<span class="tc">$1</span>');
        c = c.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="tc">$1</span>');
        c = c.replace(/((?:`[^`]*`|'[^'\\]*(?:\\[\s\S][^'\\]*)*'|"[^"\\]*(?:\\[\s\S][^"\\]*)*"))/g,'<span class="ts">$1</span>');
        c = c.replace(/\b(const|let|var|function|return|if|else|new|class|async|await|for|of|in|this|true|false|null|undefined|forEach|map|store|set|get)\b/g,'<span class="tk">$1</span>');
        c = c.replace(/\b(\d+\.?\d*)\b/g,'<span class="tn">$1</span>');
        c = c.replace(/\.([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=\()/g,'.<span class="tm">$1</span>');
        c = c.replace(/([a-zA-Z_$][a-zA-Z0-9_$]*)(?:\s*):/g,'<span class="tk2">$1</span>:');
        return c;
    }

    on('#code-fab', 'click', () => {
        if ($('#code-viewer')) return;
        const src = $('#page-source').textContent;
        const viewer = create('div', { class: 'code-viewer', id: 'code-viewer', child: [
            create('div', { class: 'cv-header', child: [
                create('div', { class: 'cv-title', html: 'example2.html &nbsp;&#8250;&nbsp; <span>Noshi Analytics Pro — Dashboard Source</span>' }),
                create('div', { class: 'cv-actions', child: [
                    create('button', { class: 'cv-btn cv-copy', text: 'Copy', click: function() {
                        navigator.clipboard && navigator.clipboard.writeText(src);
                        this.textContent='✓ Copied!'; this.classList.add('ok');
                        setTimeout(()=>{this.textContent='Copy';this.classList.remove('ok');},2000);
                    }}),
                    create('button', { class: 'cv-btn cv-close', text: '✕ Close', click: () => viewer.remove() })
                ]})
            ]}),
            create('div', { class: 'cv-body', child: [
                create('pre', { html: hl(src.trim()) })
            ]})
        ]});
        append(document.body, viewer);
        const esc = (e) => { if(e.key==='Escape'){viewer.remove();document.removeEventListener('keydown',esc);} };
        on(document, 'keydown', esc);
    });
});
</script>
</body>
</html>
